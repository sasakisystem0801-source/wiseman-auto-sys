# Wiseman Hub 設定ファイル
# このファイルをコピーして環境に合わせて編集してください

[app]
version = "0.1.0"
log_level = "INFO"
log_dir = ""  # 空の場合はカレントディレクトリ

[wiseman]
# exe_path は環境ごとに変更必須（クライアント配布時は設置先の実パスに書き換える）
# 実機はデスクトップ上の .lnk ショートカット経由で起動する例:
#   exe_path = "C:\\Users\\<USER>\\OneDrive\\デスクトップ\\ワイズマンASPサービス起動_O.lnk"
# .exe を直接指定することも可能:
#   exe_path = "C:\\Program Files\\Wiseman\\wiseman.exe"
exe_path = ""  # 環境ごとに設定する
startup_wait_sec = 15  # 起動・ドングル認証待機秒数
window_title_pattern = ".*管理システム SP.*"  # ケア記録メインウィンドウのタイトルパターン
# 認証はUSBドングルのみ。アプリ内ログイン画面は存在しない（ADR-007参照）
# 起動後は「ワイズマンシステムSP」ランチャー(frmStartUp)が開く。
# ケア記録システムへは select_care_system() で遷移する。

[schedule]
enabled = false
cron = "0 8 * * *"  # 毎日8時に実行

# 抽出対象の帳票
[[reports.targets]]
name = "ケア記録集計表"
menu_path = ["ケア記録", "集計表"]
output_format = "csv"

[gcp]
project_id = "wiseman-hub-prod"
bucket_name = "wiseman-hub-prod-datalake"
service_account_key_path = "config/sa-key.json"
region = "asia-northeast1"

[updater]
enabled = false
check_interval_hours = 1
release_bucket = ""

# OCRバックエンド（Cloud Runプロキシ）設定。詳細は ADR-008 参照。
# 本セクションは PDF分割・条件付き再結合機能（src/wiseman_hub/pdf/）で使用する。
# クライアントに GCP 認証情報を持たせず、Cloud Run プロキシ経由で Vertex AI Gemini 2.5 Flash を利用する。
# [ocr_backend]
# endpoint_url = "https://wiseman-ocr-proxy-xxx-an.a.run.app"  # Cloud Run のエンドポイント
# api_key = ""                                                  # Secret Manager で発行したキーを記入
# timeout_sec = 30
# max_retries = 3

# PDF分割・条件付き再結合機能の設定。
# - input_dir: A(複数利用者PDF), B/C(利用者別PDF), D(共通PDF)を配置するフォルダ
# - output_dir: 生成された結合PDFの出力先
# - source_a_filename: 複数利用者がまとまったPDFのファイル名
# - source_d_filename: 全利用者共通で末尾連結するPDFのファイル名
# - source_b_pattern / source_c_pattern: 利用者名で展開される、利用者別PDFのファイル名パターン
# - concat_order: 利用者ごとの並び順（"A","B","C" の並び替え。"D" は必ず末尾）
# - [pdf_merge.user_name_bbox]: A の各ページから利用者名を切り出す固定矩形（ポイント単位）
# [pdf_merge]
# input_dir = ""
# output_dir = ""
# source_a_filename = ""
# source_d_filename = ""
# source_b_pattern = "B_{name}.pdf"
# source_c_pattern = "C_{name}.pdf"
# concat_order = ["A", "B", "C"]
# facility_root_dir = ""    # 事業所ルートフォルダ（ADR-013、専用ダイアログで永続化）
# ex_source_dir = ""        # .ex_ ファイル取込元フォルダ（専用ダイアログで永続化）
#
# [pdf_merge.user_name_bbox]
# x0 = 0.0
# y0 = 0.0
# x1 = 0.0
# y1 = 0.0
# dpi = 200
#
# 事業所名の別名辞書。正式フォルダ名（key）に対する別名・略称・旧名称（value 配列）を
# 保持し、ファイル名と事業所フォルダの照合で最優先一致として参照される。
# 注意: value は **必ず配列** で記述（文字列を直接書くと load 時に TypeError）。
#       同じ別名を複数の事業所に書くと load 時に ValueError（誤配布防止）。
# [pdf_merge.facility_aliases]
# "本田デイケア" = ["本田DC", "本田デイ"]
# "きなり(メール)※持参" = ["きなり"]

# スプレッドシート連携 B(運動機能向上計画書)/C(経過報告書) PDF 自動配置機能の設定。
# 設定値は GUI（設定ダイアログ「チェックリスト連携」タブ）から編集することを想定。
# [checklist]
# spreadsheet_id = ""                                                # Google Drive 上の xlsx file id
# karte_root = "\\\\Tera-station\\share\\02.カルテ"                  # B 用カルテルート
# monitoring_subfolder = "運動器機能向上計画書"  # canonical name のみ。substring match で 08./10./prefix なし/(過去分) 等の揺らぎを吸収 (Issue #monitoring-substring)
# fax_root = "\\\\Tera-station\\share\\03.FAX(事業所)"               # 出力先ルート
# b_output_subfolder = "運動機能向上計画書"
# c_output_subfolder = "経過報告書"
#
# 居宅名（スプレッドシート O 列）→ FAX 事業所フォルダ名 のマッピング
# [checklist.facility_routing]
# "きなり" = "きなり(メール)※持参"
# "ケアプラン太子" = "ケアプラン太子（メール）※持参"
# "シスナブ御津" = "シスナブ御津(メール)"
#
# 担当者 → C 用 xlsx パステンプレート（{era}=令和年, {month}=月数値）
# [checklist.report_staff."宮下"]
# base_dir = "\\\\Tera-station\\share\\PT 宮下"
# year_subfolder_template = "リハ経過報告書\\令和{era}年"
# file_template = "リハ経過報告書 (宮下) {month}月 .xlsx"
#
# [checklist.report_staff."小林"]
# base_dir = "\\\\Tera-station\\share\\OT小林"
# year_subfolder_template = "経過報告書\\R{era}"
# file_template = "経過報告書 R{era}.{month}.xlsx"
