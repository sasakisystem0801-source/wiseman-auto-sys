[project]
name = "wiseman-hub"
version = "0.1.0"
description = "Wiseman介護ソフト自動化ブリッジ - pywinauto RPA + GCPクラウド連携"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "yyyhhh" }]

dependencies = [
    # RPA (Windows Desktop Automation)
    "pywinauto>=0.6.8",
    "pyautogui>=0.9.54",
    # GCP
    "google-cloud-storage>=2.18.0",
    "google-cloud-pubsub>=2.23.0",
    # Scheduling
    "apscheduler>=3.10.4",
    # Desktop UI
    "pystray>=0.19.5",
    "Pillow>=10.0.0",
    # Config & Security
    "keyring>=25.0.0",
    # Data
    "pandas>=2.2.0",
    # TOML (Python <3.11 fallback)
    "tomli>=2.0.0; python_version < '3.11'",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.8.0",
    "mypy>=1.13.0",
    "pytest>=8.3.0",
    "pytest-cov>=6.0.0",
    "pyinstaller>=6.11.0",
]

[project.scripts]
wiseman-hub = "wiseman_hub.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
pythonpath = ["src"]
