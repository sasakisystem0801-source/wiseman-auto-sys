name: Unit Tests (macOS/Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      # Tk wiring tests は ``tkinter.Tk()`` で root を作れるかで skip 判定する
      # （tests/unit/ui/conftest.py の ``_tk_available`` fixture 参照）。
      # Linux runner では DISPLAY 未設定のため通常 skip されるが、xvfb で
      # 仮想 display を提供することで wiring tests も実機に近い形で実行できる
      # （Issue #63）。
      - name: Install system Tk dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-tk xvfb

      - name: Lint
        run: uv run ruff check src/

      - name: Type check
        run: uv run mypy src/

      - name: Run unit tests (skip integration)
        run: xvfb-run -a uv run pytest tests/unit -v -m "not integration"
