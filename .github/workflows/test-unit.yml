name: Unit Tests (macOS/Linux)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src/

      - name: Type check
        run: uv run mypy src/

      # Issue #209 PR1 / Issue #210 / Issue #227: assert_type + type:ignore[...] ベース
      # の static type contract lock-in を CI で発現させる。pyproject.toml の mypy
      # exclude が `^tests/` を除外しているため、当該 test ファイルは `mypy src/` step
      # から漏れる → 個別に明示指定。将来 ManifestData["checksum_sha256"] を `str` に
      # 戻す regression、_phase_log を `phase: str` に戻す regression、main/run_smoke_test
      # の戻り値を `int` に戻す regression を CI が green のまま通す事故を防ぐ。
      - name: Type check (assert_type lock-in tests)
        run: |
          uv run mypy tests/unit/launcher/test_manifest.py
          uv run mypy tests/unit/launcher/test_updater_phase_lockin.py
          uv run mypy tests/unit/launcher/test_main_exit_code_lockin.py

      - name: Run unit tests (skip integration)
        run: uv run pytest tests/unit -v -m "not integration"
