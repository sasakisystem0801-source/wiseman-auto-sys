name: Windows UI Tests

# Issue #276: tk_required 付き UI テストを Windows runner で実行し、Linux CI で
# 全 skip される構造的盲点 (PR #181 / Session 70 で再発) を解消する。
#
# 既存 workflows との分担:
#   - test-unit.yml          : Linux で全 unit (tk_required は環境的に skip)
#   - test-windows-integration.yml : Windows で integration tests (WinForms mock)
#   - test-windows-ui.yml (本 workflow) : Windows で tk_required unit tests
#
# trigger: main への push と main 向け PR で実行。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-windows-ui:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Issue #276 follow-up #2: Python 3.11 + windows-latest で `_tkinter.TclError:
      # Can't find a usable init.tcl` がランダム発生する公式 issue 報告あり
      # (actions/setup-python#1102)。3.12/3.10 では発生しないため tk_required 限定の
      # 本 workflow は 3.12 を採用。tk 非依存 test は test-unit.yml の matrix で
      # 3.11/3.12 両方カバー、本番 exe は build-windows-smoke.yml が 3.11 で検証する。
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run UI unit tests (tk_required, Windows)
        run: uv run pytest tests/unit/ui -v -m "tk_required and not integration" --timeout=60
        timeout-minutes: 5
