name: Build Windows Smoke

# PyInstaller で wiseman_hub.exe / wiseman_launcher.exe を Windows runner でビルドし、
# 各 spec の hidden imports / DLL 解決を smoke 検証する。
#   - wiseman_hub.exe: --smoke-test 引数 (Issue #80)
#   - wiseman_launcher.exe: --version 引数 (Issue #217、PR-6 後半で
#     sigstore + tuf + cryptography 推移依存を hidden imports に追加)
#
# 既存の test-windows-integration.yml は WinForms mock + pytest 用で責務が異なる。
# 本ワークフローはビルド検証 + smoke 専用に分離している。
#
# セキュリティ方針: issue/PR の title/body/label 等の untrusted メタデータは
# 一切参照しない（script injection 防止）。PR の HEAD コミット内容自体は
# checkout してビルド対象として実行されるため、本ワークフローを
# `pull_request_target` トリガーへ昇格させたり secrets を追加することは禁止。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-smoke:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build wiseman_hub.exe (PyInstaller)
        run: uv run pyinstaller wiseman_hub.spec --clean --noconfirm

      - name: Verify exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\wiseman_hub.exe")) {
            Write-Host "===== dist\ contents ====="
            Get-ChildItem dist\ -ErrorAction Continue | Format-Table
            Write-Host "===== PyInstaller warn-files ====="
            Get-ChildItem build\*\warn-*.txt -ErrorAction Continue | ForEach-Object {
              Write-Host "--- $($_.FullName) ---"
              Get-Content $_.FullName
            }
            Write-Error "dist\wiseman_hub.exe was not produced by PyInstaller"
            exit 1
          }
          $size = (Get-Item "dist\wiseman_hub.exe").Length
          Write-Host "wiseman_hub.exe size: $size bytes"

      - name: Run smoke test (hidden imports / DLL resolution)
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist\wiseman_hub.exe" `
            -ArgumentList "--smoke-test" `
            -NoNewWindow `
            -Wait `
            -PassThru `
            -RedirectStandardOutput "smoke-stdout.log" `
            -RedirectStandardError "smoke-stderr.log"

          # smoke 経路は PII 防御のため stderr に型名のみを書き出す。
          # CI 側ではログ不在 (exe 起動失敗等) を silent に握り潰さず、
          # Process state / ExitCode を必ず surface してデバッグ可能性を担保する。
          Write-Host "===== process state ====="
          Write-Host "ExitCode: $($process.ExitCode)"
          Write-Host "HasExited: $($process.HasExited)"

          Write-Host "===== smoke stdout ====="
          if (Test-Path "smoke-stdout.log") {
            Get-Content "smoke-stdout.log"
          } else {
            Write-Warning "smoke-stdout.log was not created (exe likely failed to launch)"
          }

          Write-Host "===== smoke stderr ====="
          if (Test-Path "smoke-stderr.log") {
            Get-Content "smoke-stderr.log"
          } else {
            Write-Warning "smoke-stderr.log was not created (exe likely failed to launch)"
          }

          if ($process.ExitCode -ne 0) {
            Write-Error "smoke test failed with exit code $($process.ExitCode)"
            exit $process.ExitCode
          }
          Write-Host "smoke test passed (exit 0)"

      - name: Upload exe artifact (success only)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wiseman_hub-exe-${{ github.sha }}
          path: dist/wiseman_hub.exe
          retention-days: 7
          if-no-files-found: error

      # ----- wiseman_launcher.exe build + smoke (Issue #217) -----
      # PR-6 後半で sigstore-python + tuf + cryptography を hidden imports に追加した
      # ため、launcher.spec の build を tag push (release.yml) 待ちにすると、minor
      # upgrade で推移依存が増えても release 直前まで気づけない。日常 PR / main push
      # で常時 build + smoke を回し、bundle 解決失敗を早期検出する。
      #
      # PyInstaller --clean は build/ のみ消すので dist\wiseman_hub.exe は保持される。
      - name: Build wiseman_launcher.exe (PyInstaller)
        run: uv run pyinstaller wiseman_launcher.spec --clean --noconfirm

      - name: Verify launcher exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\wiseman_launcher.exe")) {
            Write-Host "===== dist\ contents ====="
            Get-ChildItem dist\ -ErrorAction Continue | Format-Table
            Write-Host "===== PyInstaller warn-files (launcher) ====="
            Get-ChildItem build\wiseman_launcher\warn-*.txt -ErrorAction Continue | ForEach-Object {
              Write-Host "--- $($_.FullName) ---"
              Get-Content $_.FullName
            }
            Write-Error "dist\wiseman_launcher.exe was not produced by PyInstaller"
            exit 1
          }
          $size = (Get-Item "dist\wiseman_launcher.exe").Length
          Write-Host "wiseman_launcher.exe size: $size bytes"

      # `--smoke-test` は CI 専用 entry。sigstore-python + tuf + cryptography の主要
      # module を eager import + helper (build_expected_identity) を呼んで動作確認する。
      # `--version` だと argparse の早期 SystemExit で sigstore.py の関数内 lazy import が
      # 踏まれず、PyInstaller bundle 内の sigstore-python 解決失敗を検出できないため、
      # 本 mode を別途用意して使う (Issue #217 / src/wiseman_hub_launcher/__main__.py)。
      - name: Run launcher smoke test (--smoke-test, sigstore bundle resolution)
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist\wiseman_launcher.exe" `
            -ArgumentList "--smoke-test" `
            -NoNewWindow `
            -Wait `
            -PassThru `
            -RedirectStandardOutput "launcher-stdout.log" `
            -RedirectStandardError "launcher-stderr.log"

          Write-Host "===== launcher process state ====="
          Write-Host "ExitCode: $($process.ExitCode)"
          Write-Host "HasExited: $($process.HasExited)"

          Write-Host "===== launcher stdout ====="
          if (Test-Path "launcher-stdout.log") {
            Get-Content "launcher-stdout.log"
          } else {
            Write-Warning "launcher-stdout.log was not created (exe likely failed to launch)"
          }

          Write-Host "===== launcher stderr ====="
          if (Test-Path "launcher-stderr.log") {
            Get-Content "launcher-stderr.log"
          } else {
            Write-Warning "launcher-stderr.log was not created (exe likely failed to launch)"
          }

          if ($process.ExitCode -ne 0) {
            Write-Error "launcher smoke test failed with exit code $($process.ExitCode)"
            exit $process.ExitCode
          }
          Write-Host "launcher smoke test passed (exit 0)"

      - name: Upload launcher exe artifact (success only)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wiseman_launcher-exe-${{ github.sha }}
          path: dist/wiseman_launcher.exe
          retention-days: 7
          if-no-files-found: error
